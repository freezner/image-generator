<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4FC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8E0F7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8DD4F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6BC4F5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Body (main circle) -->
  <ellipse cx="256" cy="280" rx="140" ry="150" fill="url(#bodyGradient)"/>
  
  <!-- Head -->
  <circle cx="256" cy="200" r="120" fill="url(#bodyGradient)"/>
  
  <!-- White belly -->
  <ellipse cx="256" cy="340" rx="80" ry="70" fill="#FFFFFF"/>
  
  <!-- Pink crest/mohawk -->
  <ellipse cx="256" cy="95" rx="25" ry="40" fill="#FF8A9B"/>
  <ellipse cx="230" cy="110" rx="15" ry="25" fill="#FF8A9B" transform="rotate(-20 230 110)"/>
  <ellipse cx="282" cy="110" rx="15" ry="25" fill="#FF8A9B" transform="rotate(20 282 110)"/>
  
  <!-- Left wing -->
  <ellipse cx="130" cy="260" rx="45" ry="70" fill="#7FCDF7" transform="rotate(-15 130 260)"/>
  
  <!-- Right wing -->
  <ellipse cx="382" cy="260" rx="45" ry="70" fill="#7FCDF7" transform="rotate(15 382 260)"/>
  
  <!-- Eyes - left -->
  <circle cx="210" cy="190" r="20" fill="#333333"/>
  <circle cx="215" cy="185" r="6" fill="#FFFFFF"/>
  
  <!-- Eyes - right -->
  <circle cx="302" cy="190" r="20" fill="#333333"/>
  <circle cx="307" cy="185" r="6" fill="#FFFFFF"/>
  
  <!-- Beak -->
  <ellipse cx="256" cy="240" rx="20" ry="15" fill="#FFD93D"/>
  
  <!-- Cheeks - left -->
  <ellipse cx="170" cy="220" rx="25" ry="18" fill="#FFB6C1" opacity="0.7"/>
  
  <!-- Cheeks - right -->
  <ellipse cx="342" cy="220" rx="25" ry="18" fill="#FFB6C1" opacity="0.7"/>
  
  <!-- Feet - left -->
  <ellipse cx="210" cy="430" rx="30" ry="15" fill="#FFD93D"/>
  
  <!-- Feet - right -->
  <ellipse cx="302" cy="430" rx="30" ry="15" fill="#FFD93D"/>
  
  <!-- AI sparkle (top right) -->
  <g transform="translate(380, 100)">
    <path d="M0,-20 L5,-5 L20,0 L5,5 L0,20 L-5,5 L-20,0 L-5,-5 Z" fill="#FFD93D"/>
  </g>
  
  <!-- Small sparkle -->
  <g transform="translate(400, 150) scale(0.5)">
    <path d="M0,-20 L5,-5 L20,0 L5,5 L0,20 L-5,5 L-20,0 L-5,-5 Z" fill="#FFD93D"/>
  </g>
</svg>
